<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BR971X8QLZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BR971X8QLZ');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>亞馬遜台灣第三方服務商網絡指南</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preload" href="Banner/banner1.webp" as="image" type="image/webp">
  <style>
    /* Traditional-Chinese brand typeface — self-hosted so it loads behind the
       Great Firewall / Protozoa where fonts.googleapis.com is blocked. System
       fonts (PingFang TC / JhengHei) act as the swap fallback until it arrives. */
    @font-face{font-family:'Noto Sans TC';src:url('fonts/NotoSansTC-Regular.ttf') format('truetype');font-weight:400;font-display:swap;}
    @font-face{font-family:'Noto Sans TC';src:url('fonts/NotoSansTC-Medium.ttf') format('truetype');font-weight:500;font-display:swap;}
    @font-face{font-family:'Noto Sans TC';src:url('fonts/NotoSansTC-Bold.ttf') format('truetype');font-weight:700;font-display:swap;}
    :root{
      /* TWGS Visual Identity (2025/11) — the only 5 brand colours allowed */
      --off-white:#f5f3ef;--white:#ffffff;--squid-ink:#161d26;
      --smile-orange:#ff6200;--smile-orange-text:#f55600;
      /* Functional neutrals (body-text greys / hairlines — not brand hues) */
      --text-primary:#161d26;--text-secondary:#4a5568;--text-light:#8a919a;--border:#e2e4e7;
      /* Compatibility aliases: existing class rules reference these names.
         Every dark now maps to Squid Ink; every orange to Smile Orange. */
      --amz-navy:#161d26;--amz-navy-deep:#161d26;--amz-orange:#ff6200;--amz-orange-hover:#f55600;
      --amz-orange-light:#fff3eb;/* pale screen of Smile Orange, used for icon/hover fills */
      --bg:#ffffff;--bg-warm:#f5f3ef;--bg-card:#ffffff;--bg-section:#f5f3ef;
      --card-shadow:0 2px 8px 0 rgba(22,29,38,.06);
      --radius-sm:8px;--radius-md:12px;--radius-lg:20px;
    }
    *{box-sizing:border-box;}
    body{background:var(--bg);font-family:'Amazon Ember','Noto Sans TC','Helvetica Neue','PingFang TC','Microsoft JhengHei',Arial,sans-serif;color:var(--text-primary);margin:0;-webkit-font-smoothing:antialiased;}

    /* NAV */
    .headbar{background:var(--amz-navy-deep);color:#fff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(22,30,44,.18);}
    .headbar-inner{display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.5rem 0;min-height:52px;}
    .brand-logo{display:flex;align-items:center;cursor:pointer;padding:.3rem .6rem;border:none;border-radius:var(--radius-sm);flex-shrink:0;}
    .brand-logo:hover{opacity:.8;}
    .brand-logo img{height:26px;}
    .site-select-wrapper{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:rgba(255,255,255,.7);white-space:nowrap;padding:.3rem .6rem;border:1px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;}
    .site-select-wrapper:hover{border-color:rgba(255,255,255,.4);color:#fff;}
    .site-select-control{background:transparent;color:#fff;border:none;font-size:.8rem;font-weight:700;cursor:pointer;padding:0;}
    .site-select-control option{background:var(--amz-navy-deep);color:#fff;}
    .site-select-control:focus{outline:none;}
    .search-form{flex:1 1 auto;max-width:560px;}
    .search-box{background:#fff;border-radius:var(--radius-md);overflow:hidden;display:flex;align-items:stretch;border:2px solid var(--amz-orange);height:42px;transition:box-shadow .2s;}
    .search-box:focus-within{box-shadow:0 0 0 3px rgba(255,98,0,.2);}
    .search-box input{border:0;padding:0 .85rem;flex:1;min-width:80px;font-size:.88rem;color:var(--text-primary);}
    .search-box input:focus{outline:none;}
    .search-box .btn-search{background:var(--amz-orange);color:#fff;border:0;width:48px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:background .15s;}
    .search-box .btn-search:hover{background:var(--amz-orange-hover);}
    .nav-right-link{color:rgba(255,255,255,.85);text-decoration:none;font-size:.78rem;padding:.3rem .7rem;border:1px solid transparent;border-radius:var(--radius-sm);display:flex;align-items:center;gap:.4rem;white-space:nowrap;transition:all .15s;}
    .nav-right-link:hover{border-color:rgba(255,255,255,.4);color:#fff;}
    @media(max-width:768px){.nav-right-group{display:none!important;}.search-form{max-width:none;}}

    /* HERO */
    .hero-banner{background:var(--amz-orange);padding:0;position:relative;overflow:hidden;}
    .hero-banner-inner{max-width:1200px;margin:0 auto;padding:1.5rem 1rem;}
    .hero-carousel{border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 12px 40px rgba(255,98,0,.15);background:#fff;}
    .carousel-indicators{margin-bottom:.75rem;}
    .carousel-indicators [data-bs-target]{width:8px;height:8px;border-radius:999px;opacity:.3;transition:all .3s;}
    .carousel-indicators .active{background-color:var(--amz-orange);opacity:1;width:24px;}
    .carousel-control-prev,.carousel-control-next{width:40px;height:40px;top:50%;transform:translateY(-50%);bottom:auto;background:rgba(0,0,0,.45);border-radius:999px;opacity:1;margin:0 .5rem;transition:background .2s;}
    .carousel-control-prev:hover,.carousel-control-next:hover{background:rgba(0,0,0,.7);}
    .carousel-control-prev-icon,.carousel-control-next-icon{width:18px;height:18px;filter:brightness(0) invert(1);}
    @media(max-width:576px){.hero-carousel-content{padding:1.5rem;}}

    /* CATEGORY GRID */
    .section-sub{color:var(--text-secondary);font-size:.88rem;margin-top:.25rem;}
    .cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2rem 1.5rem;margin-top:2rem;padding:0 1rem;}
    @media(max-width:768px){.cat-grid{grid-template-columns:repeat(3,1fr);gap:1.5rem .75rem;}}
    @media(max-width:480px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
    .cat-card{background:none;border:none;padding:1rem .5rem;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.6rem;border-radius:var(--radius-lg);}
    .cat-card:hover{transform:translateY(-6px);background:var(--bg-card);box-shadow:0 12px 32px rgba(22,30,44,.1);}
    .cat-card:hover .cat-icon{background:var(--amz-orange);color:#fff;box-shadow:0 8px 24px rgba(255,98,0,.3);transform:scale(1.12);}
    .cat-card:hover .cat-name{color:var(--amz-orange);}
    .cat-icon{width:64px;height:64px;border-radius:999px;background:var(--amz-orange-light);color:var(--amz-orange);display:flex;align-items:center;justify-content:center;font-size:1.7rem;transition:all .3s ease;box-shadow:0 3px 12px rgba(255,98,0,.1);}
    .cat-name{font-weight:700;font-size:1.26rem;margin-top:.2rem;color:var(--text-primary);transition:color .2s;}
    .cat-desc{color:var(--text-light);font-size:.8rem;line-height:1.4;}

    /* DOMAIN TAB BAR */
    .domain-bar{background:var(--amz-navy);position:sticky;top:52px;z-index:90;box-shadow:0 2px 8px rgba(22,30,44,.12);}
    .domain-bar-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
    .domain-bar-inner::-webkit-scrollbar{display:none;}
    .domain-tab{flex:0 0 auto;padding:.65rem 1.3rem;font-size:.9rem;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;transition:all .2s;background:none;border:0;border-bottom:2.5px solid transparent;line-height:1.3;}
    .domain-tab:hover{color:#fff;background:rgba(255,255,255,.05);border-bottom-color:rgba(255,255,255,.25);}
    .domain-tab.active{color:#fff;background:rgba(255,98,0,.12);border-bottom-color:var(--amz-orange);font-weight:700;}

    /* SUB-TYPE PILLS */
    #subTypeNav{gap:.4rem;}
    #subTypeNav .nav-link{font-size:1.02rem;border-radius:var(--radius-sm);padding:.5rem .8rem;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);transition:all .2s;font-weight:500;text-align:left;white-space:normal;line-height:1.3;}
    #subTypeNav .nav-link:hover{border-color:var(--amz-orange);color:var(--amz-orange);background:var(--amz-orange-light);}
    #subTypeNav .nav-link.active{background:var(--amz-orange);color:#fff;border-color:var(--amz-orange);font-weight:600;box-shadow:0 3px 12px rgba(255,98,0,.25);}

    /* PROVIDER CARDS */
    .sp-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;cursor:pointer;transition:all .25s;box-shadow:var(--card-shadow);height:100%;position:relative;overflow:hidden;}
    .sp-card:hover{box-shadow:0 8px 28px rgba(22,30,44,.12);border-color:var(--amz-orange);transform:translateY(-2px);}
    .sp-card::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--amz-orange);border-radius:var(--radius-md) var(--radius-md) 0 0;opacity:0;transition:opacity .25s;}
    .sp-card:hover::after{opacity:1;}
    .sp-card.sp-highlighted{border-left:3px solid var(--smile-orange);background:var(--amz-orange-light);}
    .sp-card.sp-highlighted::after{opacity:0;}
    .sp-badge{position:absolute;top:.6rem;right:.6rem;background:var(--squid-ink);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;display:flex;align-items:center;gap:.25rem;}
    .sp-spn-logo{vertical-align:middle;border:1px solid var(--border);border-radius:999px;background:#fff;padding:.12rem .4rem;box-shadow:0 1px 3px rgba(22,30,44,.08);}
    .sp-logo{width:46px;height:46px;border-radius:var(--radius-sm);background:var(--amz-orange-light);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--smile-orange-text);font-weight:700;flex-shrink:0;}
    .sp-name{font-weight:700;font-size:.88rem;color:var(--text-primary);}
    .sp-award-tag{display:inline-block;background:var(--smile-orange);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;vertical-align:middle;margin-left:.3rem;white-space:nowrap;}
    .sp-intro{font-size:.75rem;color:var(--text-secondary);margin-top:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;}
    .sp-tags{font-size:.72rem;color:var(--text-light);margin-top:.25rem;}
    .sp-sites{font-size:.72rem;color:var(--smile-orange-text);margin-top:.45rem;font-weight:600;}

    /* DETAIL */
    .detail-card{background:var(--bg-card);border-radius:var(--radius-md);border:1px solid var(--border);padding:2rem;box-shadow:var(--card-shadow);}
    .detail-card h3{color:var(--text-primary);}
    .detail-card h5{color:var(--text-primary);font-size:.95rem;font-weight:700;margin-top:1.5rem;padding-bottom:.5rem;border-bottom:2px solid var(--bg-section);}
    .detail-card p{font-size:.88rem;color:var(--text-secondary);}
    .detail-card hr{border-color:var(--bg-section);}
    .detail-card a{color:var(--smile-orange-text);text-decoration:none;font-weight:500;}
    .detail-card a:hover{color:var(--smile-orange);text-decoration:underline;}
    .spn-intro{display:flex;align-items:flex-start;gap:.85rem;background:var(--off-white);border:1px solid var(--border);border-left:3px solid var(--smile-orange);border-radius:var(--radius-md);padding:.85rem 1.1rem;margin-top:1rem;}
    .spn-intro img{height:30px;flex-shrink:0;margin-top:.1rem;cursor:pointer;}
    .spn-intro .spn-intro-title{font-weight:700;font-size:.9rem;color:var(--squid-ink);margin-bottom:.2rem;}
    .spn-intro .spn-intro-text{font-size:.82rem;color:var(--text-secondary);line-height:1.6;}
    .svc-section{background:var(--bg-section);border-radius:var(--radius-md);padding:0;margin-top:.75rem;overflow:hidden;border:1px solid var(--border);}
    .svc-section h6{font-size:.85rem;font-weight:700;color:var(--amz-orange);margin-bottom:.4rem;}
    .svc-section .svc-sub{font-size:.78rem;color:var(--text-light);margin-bottom:.3rem;}
    .svc-section .svc-desc{font-size:.84rem;color:var(--text-secondary);line-height:1.6;}
    .svc-header{background:var(--amz-navy);padding:.75rem 1.2rem;display:flex;align-items:center;gap:.6rem;position:relative;overflow:hidden;border-bottom:1px solid var(--border);min-height:48px;}
    .svc-header::before{content:"";position:absolute;inset:0;background:url('Tier 1 service image.png') center 40%/cover no-repeat;opacity:.12;}
    .svc-header-icon{width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;position:relative;z-index:1;}
    .svc-header-title{font-size:1.05rem;font-weight:700;color:#fff;position:relative;z-index:1;}
    .svc-body{padding:1rem 1.2rem;}
    .svc-tier1{font-size:.92rem;font-weight:700;color:var(--text-primary);margin-bottom:.3rem;}
    .svc-tier2{font-size:.88rem;font-weight:600;color:var(--amz-orange);margin-bottom:.5rem;}
    .svc-icon{width:36px;height:36px;border-radius:999px;background:var(--amz-orange-light);color:var(--amz-orange);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .svc-flags{margin-top:.8rem;font-size:1.1rem;letter-spacing:.2rem;}
    .btn-outline-secondary{border-color:var(--border);color:var(--text-secondary);font-size:.82rem;border-radius:var(--radius-sm);transition:all .2s;}
    .btn-outline-secondary:hover{background:var(--amz-orange-light);border-color:var(--amz-orange);color:var(--amz-orange);}

    /* FOOTER */
    .site-footer{background:var(--amz-navy-deep);color:rgba(255,255,255,.5);padding:2.5rem 0 2rem;font-size:.78rem;text-align:center;}
    .site-footer::before{content:"";display:block;height:5px;background:var(--smile-orange);margin-bottom:0;position:relative;top:-2.5rem;}
  </style>
</head>
<body>

<!-- NAV -->
<nav class="headbar">
  <div class="container headbar-inner">
    <div class="brand-logo" onclick="goHome()"><img src="amazon-logo-white.png" alt="Amazon"></div>
    <div class="site-select-wrapper">
      <i class="bi bi-geo-alt-fill" style="font-size:.9rem;color:#fff"></i>
      <div>
        <div style="font-size:.68rem;color:#ccc;line-height:1">選擇站點</div>
        <select id="siteSelect" class="site-select-control">
          <option value="all">全部站點</option>
          <option value="北美站" selected>北美站</option>

    </form>
    <div class="nav-right-group d-flex align-items-center gap-2">
      <a href="https://m.media-amazon.com/images/G/28/TWGS/RD/SP_Recruitment.jpg" target="_blank" class="nav-right-link"><i class="bi bi-info-circle"></i> 了解如何成為服務商</a>
    </div>
  </div>
</nav>

<!-- HERO BANNER -->
<section class="hero-banner">
  <div class="hero-banner-inner">
    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
      </div>
      <div class="carousel-inner" style="border-radius:var(--radius-lg);overflow:hidden;">
        <div class="carousel-item active"><a href="https://gs.amazon.com.tw/logistics/send" target="_blank" rel="noopener"><img src="Banner/banner1.webp" class="d-block w-100" alt="Amazon SEND 亞馬遜跨境合作承運方計畫" style="max-height:250px;object-fit:cover;" fetchpriority="high"></a></div>
        <div class="carousel-item"><img src="Banner/banner2.webp" class="d-block w-100" alt="Banner 2" style="max-height:250px;object-fit:cover;"></div>
        <div class="carousel-item">
          <a href="https://twgsrd.github.io/GOV-Sub/" target="_blank" style="text-decoration:none;display:block;">
            <div style="aspect-ratio:2400/490;max-height:250px;background:var(--squid-ink);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.6rem;padding:1rem;overflow:hidden;">
              <div style="background:rgba(255,98,0,.15);border:1px solid rgba(255,98,0,.45);border-radius:999px;padding:clamp(.15rem,1vw,.5rem) clamp(.6rem,3vw,1.5rem);font-size:clamp(.6rem,2vw,.85rem);color:var(--smile-orange);font-weight:600;letter-spacing:.5px;white-space:nowrap;">🏛️ GOV SUBSIDY</div>
              <div style="color:#fff;font-size:clamp(.95rem,4vw,2.2rem);font-weight:800;text-align:center;line-height:1.2;">政府補助資訊</div>
              <div style="color:rgba(255,255,255,.75);font-size:clamp(.7rem,2.5vw,1.1rem);text-align:center;line-height:1.2;">了解跨境電商相關補助方案 →</div>
            </div>
          </a>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
      <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
    </div>
  </div>
</section>

<!-- LEVEL 1: Service Domains -->
<section id="level1" class="py-3" style="background:var(--bg-warm)">
  <div class="container">
    <div class="text-center mb-2"><div class="section-sub">選擇服務大類，瀏覽子類別與服務商</div></div>
    <div id="catGrid" class="cat-grid"></div>
  </div>
</section>

<!-- LEVEL 2: Domain bar + Sub-types + Provider list -->
<section id="level2" style="display:none">
  <div class="domain-bar"><div class="container"><div id="domainBar" class="domain-bar-inner"></div></div></div>
  <div class="container py-4">
    <div class="row">
      <div class="col-12 col-md-3 mb-3" style="min-width:180px;">
        <nav id="subTypeNav" class="nav flex-column gap-1 position-sticky" style="top:110px;"></nav>
      </div>
      <div class="col">
        <div id="spList" class="row g-3"></div>
      </div>
    </div>
  </div>
</section>

<!-- LEVEL 3: Provider detail -->
<section id="level3" style="display:none">
  <div class="domain-bar"><div class="container"><div id="domainBar3" class="domain-bar-inner"></div></div></div>
  <div class="container py-4">
    <button class="btn btn-outline-secondary mb-3" style="font-size:1rem;padding:.5rem 1.2rem;font-weight:600;" onclick="goBackOrL2()"><i class="bi bi-arrow-left-circle-fill me-2" style="font-size:1.2rem;"></i>返回列表</button>
    <div id="spDetail"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container d-flex justify-content-center gap-4 mb-2" style="font-size:.85rem;">
    <a href="https://gs.amazon.com.tw/" target="_blank" style="color:rgba(255,255,255,.8);text-decoration:none;transition:color .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.8)'"><i class="bi bi-info-circle me-1"></i>關於亞馬遜</a>
    <a href="contact.html" style="color:rgba(255,255,255,.8);text-decoration:none;transition:color .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.8)'"><i class="bi bi-envelope me-1"></i>聯繫我們</a>
  </div>
  <div>© 2026 亞馬遜台灣第三方服務商網絡指南</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ===== State ===== */
let providers=[], providerMap={}, categories=[], categoryMap={};
let curCat=null, curSub=null, curSite=null;
const $=id=>document.getElementById(id);

/* Amazon SPN landing page (linked from the SPN badge) */
const SPN_URL="https://sellercentral.amazon.com/gspn?ref_=svs_gspn_soaspn_hp&initialSessionID=140-0185071-4678623&ld=NSGoogle&pageName=US%3ASD%3ASOA-spn&ldStackingCodes=NSGoogle";
/* Detail-page SPN badge. Rendered as an orange pill with the WHITE
   "Amazon Service Provider Network" wordmark inside, so it visually matches the
   other orange award pills (.sp-award-tag: SEND / 優選) sitting on the same title
   row. The wordmark is ~19:1, sized by height inside the pill. */
const spnBadge=(h)=>` <a href="${SPN_URL}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Amazon Service Provider Network" style="display:inline-flex;align-items:center;background:var(--smile-orange);border-radius:999px;padding:.15rem .5rem;vertical-align:middle;margin-left:.3rem;"><img src="spn-logo-white.png" alt="Amazon Service Provider Network" style="height:10px;width:auto;display:block;"></a>`;
/* Amazon Ads Verified Partner badge — links to the partner's directory detail page.

/* Sub-type region restrictions: only show these sub-types when the specified site is selected */
const SUB_REGION_RESTRICT = {
  "Amazon SEND": ["北美站"]
};
function subAllowedForSite(sub){
  const allowed = SUB_REGION_RESTRICT[sub];
  if(!allowed) return true; // no restriction
  if(!curSite || curSite==="all") return true; // show all when "全部站點"
  return allowed.includes(curSite);
}
const level1=$("level1"), level2=$("level2"), level3=$("level3");

/* ===== Helpers ===== */
function matchSite(p){
  if(!curSite||curSite==="all") return true;
  return p.regions && p.regions.includes(curSite);
}
function initials(n){ return n.replace(/[\(（].*?[\)）]/g,"").trim().slice(0,2); }
function fmt(text){
  if(!text) return "";
  // Convert newlines to <br>
  let s = text.replace(/\n/g,"<br>");
  // Auto-link URLs
  s = s.replace(/(https?:\/\/[^\s<,，、）)]+)/g,'<a href="$1" target="_blank" style="color:inherit;text-decoration:underline;">$1</a>');
  return s;
}
// Clean a contact field for display: hide it entirely when the whole cell is
// just a placeholder ("未提供") or a leftover spreadsheet error (#ERROR! etc.),
// and strip an error token that is glued onto an otherwise-valid value. Normal
// punctuation inside real values (commas, 、 between numbers) is left untouched.
function cleanContact(v){
  if(!v) return "";
  let s = String(v).trim();
  if(s==="未提供") return "";
  if(/^#(?:ERROR!|REF!|N\/A|NAME\?|VALUE!|DIV\/0!|NULL!|NUM!)$/i.test(s)) return "";        // whole cell is an error
  s = s.replace(/[/、,，]\s*#(?:ERROR!|REF!|N\/A|NAME\?|VALUE!|DIV\/0!|NULL!|NUM!)/ig,"");   // "x / #ERROR!" -> "x"
  s = s.replace(/#(?:ERROR!|REF!|N\/A|NAME\?|VALUE!|DIV\/0!|NULL!|NUM!)\s*[/、,，]\s*/ig,""); // "#ERROR! / x" -> "x"
  return s.trim();
}
// Render the website field, tolerating an optional "label: url" prefix (e.g. "預約寄件: https://...")
function websiteLink(w){
  w = cleanContact(w);
  if(!w) return "";
  const m = w.match(/^(.*?)[:：]?\s*(https?:\/\/\S+)/);
  const label = m && m[1].trim() ? m[1].trim()+"：" : "";
  const url = m ? m[2] : (w.startsWith("http")?w:"https://"+w);
  return `<p class="mb-1"><i class="bi bi-globe me-2"></i>${label}<a href="${url}" target="_blank" style="color:inherit;text-decoration:underline;">${url}</a></p>`;
}
function logoHTML(p, size){
  size = size || 46;
  if(p.logoFile){
    return `<img src="Logos/${encodeURIComponent(p.logoFile)}" alt="${p.name}" style="width:${size}px;height:${size}px;border-radius:var(--radius-sm);object-fit:contain;background:#fff;">`;
  }
  if(p.logoId){
    return `<img src="https://drive.google.com/thumbnail?id=${p.logoId}&sz=w${size*2}" alt="${p.name}" style="width:${size}px;height:${size}px;border-radius:var(--radius-sm);object-fit:contain;background:#fff;">`;
  }
  return `<div class="sp-logo" style="width:${size}px;height:${size}px">${initials(p.name)}</div>`;
}
function renderRoutes(p){
  if(!p.routes) return "";
  const countries=Object.keys(p.routes);
  if(!countries.length) return "";
  const modes=["快遞","海運","空運"];
  const flagImg={"美國":"flags/US.png","歐洲":"flags/EU.png","日本":"flags/JP.png","澳洲":"flags/AU.png","沙烏地阿拉伯":"flags/沙烏地阿拉伯.png","阿聯酋":"flags/阿聯酋.avif"};
  let html=`<div class="routes-table mt-3 mb-2"><h5 style="font-size:.95rem;font-weight:700;color:var(--text-primary);margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:2px solid var(--bg-section);"><i class="bi bi-signpost-2 me-2"></i>頭程物流服務</h5>`;
  html+=`<table style="border-collapse:collapse;font-size:.8rem;"><thead><tr><th style="padding:.4rem .6rem;border-bottom:2px solid var(--border);text-align:left;color:var(--text-light);"></th>`;
  countries.forEach(c=>{
    const flag=flagImg[c]?`<img src="${flagImg[c]}" style="height:14px;vertical-align:middle;margin-right:3px;">`:"";
    html+=`<th style="padding:.4rem .6rem;border-bottom:2px solid var(--border);text-align:center;color:var(--text-secondary);font-weight:600;">${flag}${c}</th>`;
  });
  html+=`</tr></thead><tbody>`;
  modes.forEach(mode=>{
    html+=`<tr>`;
    html+=`<td style="padding:.35rem .6rem;border-bottom:1px solid var(--bg-section);font-weight:600;color:var(--text-primary);">${mode}</td>`;
    countries.forEach(c=>{
      const has=p.routes[c]&&p.routes[c].includes(mode);
      html+=`<td style="padding:.35rem .6rem;border-bottom:1px solid var(--bg-section);text-align:center;">${has?'<i class="bi bi-check-circle-fill" style="color:var(--smile-orange);"></i>':'<span style="color:var(--border);">—</span>'}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}
function icon(n){
  if(!n) return "bi-grid-1x2";
  if(/產品展示|品牌策略|拍攝|圖片|設計/.test(n)) return "bi-camera";
  if(/帳戶營運|代營運|營運協助|顧問/.test(n)) return "bi-graph-up-arrow";
  if(/廣告|營銷|KOL|推廣/.test(n)) return "bi-megaphone";
  if(/合規|稅務|VAT/.test(n)) return "bi-receipt-cutoff";
  if(/物流|FBA|SEND|自發貨/.test(n)) return "bi-truck";
  if(/海外倉|倉儲|退貨|一件代發/.test(n)) return "bi-box-seam";
  if(/金融|金流|財務|收款/.test(n)) return "bi-bank";
  if(/AI|工具|選品|第三方營運/.test(n)) return "bi-cpu";
  if(/商標|智慧財產/.test(n)) return "bi-shield-check";
  if(/條碼|保險/i.test(n)) return "bi-upc-scan";
  return "bi-grid-1x2";
}

/* ===== History / deep-link navigation ===== */
let suppressPush=false;
function stateHash(s){
  // Home uses a clean URL (no #) so the shared landing-page link stays tidy
  if(!s||s.view==="home") return location.pathname+location.search;
  if(s.view==="search") return "#/s/"+encodeURIComponent(s.q||"");
  if(s.view==="category") return "#/c/"+encodeURIComponent(s.cat)+(s.sub?"/"+encodeURIComponent(s.sub):"");
  if(s.view==="detail") return "#/p/"+encodeURIComponent(s.name);
  return location.pathname+location.search;
}
function pushNav(s){
  if(suppressPush) return;
  s.depth=((history.state&&history.state.depth)||0)+1;
  history.pushState(s,"",stateHash(s));
}
function parseHash(){
  const parts=(location.hash||"").replace(/^#\/?/,"").split("/").filter(Boolean).map(decodeURIComponent);
  if(!parts.length) return {view:"home"};
  if(parts[0]==="s") return {view:"search",q:parts[1]||""};
  if(parts[0]==="c") return {view:"category",cat:parts[1],sub:parts[2]||null};
  if(parts[0]==="p") return {view:"detail",name:parts[1]};
  return {view:"home"};
}
function selectSub(sub){
  const nav=$("subTypeNav"); if(!nav) return;
  const btn=[...nav.querySelectorAll(".nav-link")].find(b=>b.textContent===sub);
  if(btn) btn.click();
}
function renderState(s){
  suppressPush=true;
  try{
    if(!s||s.view==="home"){ goHome(); }
    else if(s.view==="search"){ $("searchInput").value=s.q||""; runSearch(); }
    else if(s.view==="category"){
      if(!categoryMap[s.cat]){ goHome(); return; }
      openCategory(s.cat);
      if(s.sub) selectSub(s.sub);
    }
    else if(s.view==="detail"){
      if(s.cat&&categoryMap[s.cat]){ curCat=categoryMap[s.cat]; curSub=s.sub||null; }
      if(!providerMap[s.name]){ goHome(); return; }
      openDetail(s.name);
    }
    else goHome();
  } finally { suppressPush=false; }
}
// On-page "返回列表": prefer real browser-back; fall back for deep-linked entries
function goBackOrL2(){
  if(((history.state&&history.state.depth)||0)>0){ history.back(); return; }
  if(curCat) openCategory(curCat.name); else goHome();
}

function renderSubNav(){
  const nav=$("subTypeNav"); nav.innerHTML="";
  if(!curCat.subTypes.length) return;
  const visibleSubs = curCat.subTypes.filter(sub=>subAllowedForSite(sub));
  if(!visibleSubs.length) return;
  const mkBtn=(label,active)=>{const b=document.createElement("button");b.className="nav-link"+(active?" active":"");b.textContent=label;return b;};
  const allBtn=mkBtn("全部",true);
  allBtn.addEventListener("click",()=>{
    nav.querySelectorAll(".nav-link").forEach(x=>x.classList.remove("active"));
    allBtn.classList.add("active"); curSub=null;
    renderSPList(providersForCat(curCat));
    pushNav({view:"category",cat:curCat.name});
  });
  nav.appendChild(allBtn);
  visibleSubs.forEach(sub=>{
    const btn=mkBtn(sub,false);
    btn.addEventListener("click",()=>{
      nav.querySelectorAll(".nav-link").forEach(x=>x.classList.remove("active"));
      btn.classList.add("active"); curSub=sub;
      gtag('event', 'view_service_subdomain', { tier1_domain: curCat.name, tier2_subdomain: sub });
      renderSPList(providers.filter(p=>matchSite(p)&&providerMatchesSub(p,sub)));
      pushNav({view:"category",cat:curCat.name,sub:sub});
    });
    nav.appendChild(btn);
  });
}

/* ===== Provider matching logic ===== */
function providerMatchesCat(p, cat){
  // Check if provider's tags match this category
  if(p.tags.includes(cat.name)) return true;
  // Check if provider's svc keys match
  if(p.svc && p.svc[cat.name]) return true;
  // Check if any sub-type matches
  for(const sub of cat.subTypes){
    if(providerMatchesSub(p, sub)) return true;
  }
  return false;
}

function providerMatchesSub(p, sub){
  // If sub-type is region-restricted and current site doesn't match, never match
  if(!subAllowedForSite(sub)) return false;
  // Check in svc sub fields - only match within the current category's svc
  if(p.svc && curCat){
    const catSvc = p.svc[curCat.name];
    if(catSvc && catSvc.sub){
      if(catSvc.sub.includes(sub)) return true;
      const subParts = sub.replace(/以及/g,"以及,").split(/[,、，]\s*/);
      const svcParts = catSvc.sub.split(/[,、，]\s*/);
      for(const sp of subParts){
        if(sp && svcParts.some(sv=>sv.includes(sp))) return true;
      }
    }
  }
  // Fallback: check all svc keys if no curCat
  if(p.svc && !curCat){
    for(const key in p.svc){
      if(p.svc[key].sub){
        if(p.svc[key].sub.includes(sub)) return true;
      }
    }
  }
  // Check tags
  if(p.tags.includes(sub)) return true;
  return false;
}

function providersForCat(cat){
  return providers.filter(p=>matchSite(p)&&providerMatchesCat(p,cat));
}

        ${p.qrFile?`<div class="text-center"><img src="QRcode/${encodeURIComponent(p.qrFile)}" alt="QR Code" style="width:120px;height:120px;object-fit:contain;border-radius:var(--radius-sm);border:1px solid var(--border);"><div style="font-size:.7rem;color:var(--text-light);margin-top:.3rem">掃碼聯繫</div></div>`:p.qrId?`<div class="text-center"><img src="https://drive.google.com/thumbnail?id=${p.qrId}&sz=w240" alt="QR Code" style="width:120px;height:120px;object-fit:contain;border-radius:var(--radius-sm);border:1px solid var(--border);"><div style="font-size:.7rem;color:var(--text-light);margin-top:.3rem">掃碼聯繫</div></div>`:""}
      </div>
      ${p.routes?renderRoutes(p):""}
      ${spnIntro}
      ${svcHTML}
      <div class="mt-4"><button class="btn btn-outline-secondary" style="font-size:1rem;padding:.5rem 1.2rem;font-weight:600;" onclick="goBackOrL2()"><i class="bi bi-arrow-left-circle-fill me-2" style="font-size:1.2rem;"></i>返回列表</button></div>
    </div>`;
}

/* ===== Search ===== */
/* Synonym normalization — collapse common 繁簡 / 陸台 / 口語 variants so a query
   matches regardless of which wording a provider used. Applied to BOTH the query
   and the haystack, so the two meet on a shared canonical token. Order matters:
   longer / more-specific patterns first (e.g. 北美站 before 北美). Each pattern is
   a plain substring match on an already-lowercased string. */
const SEARCH_SYNONYMS=[
  ["代運營","代營運"],["運營","營運"],                                   // 陸 → 台 用語
  ["北美站","美國"],["北美","美國"],                                     // 站點名 ↔ routes 口語國名
  ["歐洲站","歐洲"],["日本站","日本"],["澳洲站","澳洲"],
  ["中東站","中東"],["沙烏地阿拉伯","中東"],["沙烏地","中東"],["阿聯酋","中東"],["杜拜","中東"],
  ["金流","收款"],["網紅","kol"]                                        // 服務口語別名
];
function normSearch(s){
  s=(s||"").toLowerCase();
  for(const [from,to] of SEARCH_SYNONYMS) s=s.split(from).join(to);
  return s;
}
function runSearch(){
  const raw=$("searchInput").value.trim();
  if(!raw){ goHome(); return; }
  const q=normSearch(raw);
  curCat=null; curSub=null;
  $("subTypeNav").innerHTML="";
  showL2(); renderDomainBar();
  const list=providers.filter(p=>{
    if(!matchSite(p)) return false;
    // Mirror the browse-by-category matcher: include the precise sub-type labels
    // (svc[].sub — the "提供的服務" line on each card), the site list, and the
    // logistics routes (destination countries + transport modes). Without these
    // a query like "代營運" or "沙烏地阿拉伯" missed providers whose cards clearly show them.
    const haystack=normSearch([
      p.name,
      p.tags.join(" "),
      p.intro||"",
      p.regions.join(" "),
      Object.keys(p.svc||{}).join(" "),
      Object.values(p.svc||{}).map(s=>(s.sub||"")+" "+(s.desc||"")).join(" "),
      p.routes?Object.entries(p.routes).map(([c,m])=>c+" "+m).join(" "):""
    ].join(" "));
    return haystack.includes(q);
  });
  renderSPList(list);
  // Log search to GA4 so we can see what sellers actually type, and which queries
  // return zero results — those are the prime candidates for new SEARCH_SYNONYMS
  // entries. search_term = raw input as typed; normalized_term = post-synonym form
  // (lets us tell whether a synonym mapping fired); result_count drives the
  // "high-frequency but zero-result" report.
  gtag('event','search',{
    search_term: raw,
    normalized_term: q,
    result_count: list.length,
    site: curSite||'all'
  });
  pushNav({view:"search",q:raw});
}

/* ===== Site change ===== */
function setSite(s){
  curSite=s||null;
  if(level2.style.display==="block"){
    if(curCat){
      // If current sub-type is no longer allowed for the new site, reset
      if(curSub && !subAllowedForSite(curSub)) curSub=null;
      renderSubNav();
      if(curSub) renderSPList(providers.filter(p=>matchSite(p)&&providerMatchesSub(p,curSub)));
      else renderSPList(providersForCat(curCat));
    } else { runSearch(); }
  }
}

/* ===== Hierarchy Data loaded from prov_data.js ===== */
</script>

<script src="prov_data.js"></script>
<script>
/* ===== Boot ===== */
function boot(){
  HIER.forEach(r=>{
    const d=r[0], s=r.slice(1).filter(Boolean);
    categories.push({name:d,subTypes:s});
  });
  categories.forEach(c=>categoryMap[c.name]=c);

  providers=PROV.map(r=>({
    name:r.n, contact:r.c||"", phone:r.p||"", email:r.e||"",
    lineId:r.l||"", intro:r.intro||"", tags:r.t||[], svc:r.svc||{},
    regions:r.r||[], website:r.w||"", score:r.score||0,
    logoId:r.logoId||"", qrId:r.qrId||"", routes:r.routes||null,
    awards:r.awards||[], logoFile:r.logoFile||"", qrFile:r.qrFile||"",
    isSpn:r.isSpn||false,
    isAdsPartner:r.isAdsPartner||false, adsLink:r.adsLink||""
  }));
  providers.sort((a,b)=>{
    const aS=a.awards.some(aw=>aw.includes("SEND"))?1:0;
    const bS=b.awards.some(aw=>aw.includes("SEND"))?1:0;
    if(bS!==aS) return bS-aS;
    return b.score-a.score;
  });
  providers.forEach(p=>providerMap[p.name]=p);

  renderL1();
  $("searchForm").addEventListener("submit",e=>{ e.preventDefault(); runSearch(); });
  const sel=$("siteSelect");
  sel.addEventListener("change",()=>{ curSite=sel.value; setSite(curSite); });
  curSite=sel.value;

  // Wire browser back/forward + deep-link / refresh restore
  window.addEventListener("popstate",e=>{ renderState(e.state||parseHash()); });
  const initial=parseHash();
  history.replaceState({...initial,depth:0},"",stateHash(initial));
  renderState(initial);
}
document.addEventListener("DOMContentLoaded",boot);
</script>
